name: docker-edge

# Publishes :edge images to GHCR on every successful push to main.
# Triggered only when backend or web source changes to avoid unnecessary builds.

on:
  push:
    branches: [main]
    paths:
      - 'src/backend/**'
      - 'src/web/app/**'
      - 'DomusMind.slnx'
      - '.github/workflows/docker-edge.yml'
  workflow_dispatch:

concurrency:
  group: docker-edge
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/backend/DomusMind.Api/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/domusmind-api:edge
          cache-from: type=gha,scope=api
          cache-to:   type=gha,scope=api,mode=max

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: src/web/app
          file: src/web/app/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/domusmind-web:edge
          cache-from: type=gha,scope=web
          cache-to:   type=gha,scope=web,mode=max
