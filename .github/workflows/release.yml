name: release

# Triggered by semver tags.  Supported formats:
#   Stable:     v1.0.0  v1.0.1  v1.1.0
#   Prerelease: v1.1.0-alpha.1  v1.1.0-beta.1  v1.1.0-rc.1

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
  workflow_dispatch:

# One release at a time; do NOT cancel in-progress releases.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write   # create GitHub Release
  packages: write   # push to GHCR

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ---------------------------------------------------------------------------
  # Parse the semver tag and compute Docker image tags
  # ---------------------------------------------------------------------------
  parse-version:
    name: Parse version
    runs-on: ubuntu-latest
    outputs:
      version:        ${{ steps.parse.outputs.version }}
      is_prerelease:  ${{ steps.parse.outputs.is_prerelease }}
      image_tags_api: ${{ steps.parse.outputs.image_tags_api }}
      image_tags_web: ${{ steps.parse.outputs.image_tags_web }}

    steps:
      - name: Parse semver tag
        id: parse
        env:
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"   # strip leading 'v'

          # Prerelease: any version containing a hyphen (e.g. 1.0.0-alpha.1)
          if [[ "$VERSION" == *"-"* ]]; then
            IS_PRERELEASE=true
          else
            IS_PRERELEASE=false
          fi

          REGISTRY="ghcr.io/${{ github.repository_owner }}"

          if [ "$IS_PRERELEASE" = "true" ]; then
            # Prerelease: exact tag only — must not move 'latest'
            TAGS_API="${REGISTRY}/domusmind-api:${VERSION}"
            TAGS_WEB="${REGISTRY}/domusmind-web:${VERSION}"
          else
            # Stable: exact tag + minor alias (major.minor) + latest
            MINOR="$(echo "$VERSION" | cut -d. -f1,2)"
            TAGS_API="${REGISTRY}/domusmind-api:${VERSION},${REGISTRY}/domusmind-api:${MINOR},${REGISTRY}/domusmind-api:latest"
            TAGS_WEB="${REGISTRY}/domusmind-web:${VERSION},${REGISTRY}/domusmind-web:${MINOR},${REGISTRY}/domusmind-web:latest"
          fi

          echo "version=${VERSION}"               >> "$GITHUB_OUTPUT"
          echo "is_prerelease=${IS_PRERELEASE}"   >> "$GITHUB_OUTPUT"
          echo "image_tags_api=${TAGS_API}"       >> "$GITHUB_OUTPUT"
          echo "image_tags_web=${TAGS_WEB}"       >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Backend: restore → build → test
  # ---------------------------------------------------------------------------
  backend:
    name: Backend — build & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore DomusMind.slnx

      - name: Build
        run: dotnet build DomusMind.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test DomusMind.slnx --no-build --configuration Release

  # ---------------------------------------------------------------------------
  # Web: install → build
  # Note: no automated test suite exists yet; build validation is current coverage.
  # ---------------------------------------------------------------------------
  web:
    name: Web — build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/web/app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: src/web/app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  # ---------------------------------------------------------------------------
  # Build and push Docker images to GHCR
  # ---------------------------------------------------------------------------
  images:
    name: Build & push images
    runs-on: ubuntu-latest
    needs: [parse-version, backend, web]

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/backend/DomusMind.Api/Dockerfile
          push: true
          tags: ${{ needs.parse-version.outputs.image_tags_api }}
          cache-from: type=gha,scope=api
          cache-to:   type=gha,scope=api,mode=max

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: src/web/app
          file: src/web/app/Dockerfile
          push: true
          tags: ${{ needs.parse-version.outputs.image_tags_web }}
          cache-from: type=gha,scope=web
          cache-to:   type=gha,scope=web,mode=max

  # ---------------------------------------------------------------------------
  # Validate release assets and publish GitHub Release
  # ---------------------------------------------------------------------------
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [parse-version, images]

    steps:
      - uses: actions/checkout@v4

      - name: Validate compose configuration
        env:
          # Provide dummy values so docker compose config can resolve all variables
          DB_USER:       ci-test
          DB_PASSWORD:   ci-test-password
          JWT_SECRET:    ci-test-jwt-secret-placeholder-32ch
          JWT_ISSUER:    domusmind
          VERSION:       ${{ needs.parse-version.outputs.version }}
          GHCR_OWNER:    ${{ github.repository_owner }}
          API_PORT:      "8080"
          WEB_PORT:      "80"
          API_BASE_URL:  http://api:8080
        run: docker compose -f deploy/docker-compose.yml config --quiet

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:             ${{ github.ref_name }}
          name:                 DomusMind ${{ github.ref_name }}
          prerelease:           ${{ needs.parse-version.outputs.is_prerelease == 'true' }}
          generate_release_notes: true
          files: |
            deploy/docker-compose.yml
            deploy/.env.example
            deploy/README.md
